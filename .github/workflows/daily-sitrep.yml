name: Daily Wildfire Sitrep

# NIFC posts the Incident Management Situation Report around 0730 MDT (1330 UTC).
# Run a little after that with buffer; also allow manual runs.
on:
  schedule:
    - cron: "30 12 * * *"   # 13:30 UTC daily (~07:30 MDT | 06:30 PDT)
  workflow_dispatch: {}

# Let the workflow's built-in GITHUB_TOKEN commit the regenerated HTML.
# No personal access token required.
permissions:
  contents: write

concurrency:
  group: wildfire-sitrep
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          OUTPUT_PATH: wildfire-sitrep.html
          CONTACT_EMAIL: rachael.brady@theanalyticalmoose.com
        run: python generate.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- wildfire-sitrep.html; then
            echo "No content change today; skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add wildfire-sitrep.html
            git commit -m "Daily wildfire situation report - $(date -u +'%Y-%m-%d')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Emails the full report HTML via Resend after each day's report is
      # committed. Requires the RESEND_API_KEY repository secret; if the
      # secret isn't set, this step just logs a note and succeeds.
      # Note: onboarding@resend.dev can only deliver to the email address
      # that owns the Resend account. Once you verify a domain in Resend,
      # change EMAIL_FROM to an address on that domain.
      - name: Email report via Resend
        if: steps.commit.outputs.changed == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: "Wildfire Sitrep <onboarding@resend.dev>"
          EMAIL_TO: rachael.brady@theanalyticalmoose.com
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY secret not set; skipping email."
            exit 0
          fi
          # Strip stray whitespace/newlines that can sneak in when pasting the secret.
          RESEND_API_KEY=$(printf '%s' "$RESEND_API_KEY" | tr -d '[:space:]')
          python - <<'EOF'
          import json, os, re

          from premailer import transform

          html = open("wildfire-sitrep.html", encoding="utf-8").read()
          m = re.search(r"<title>(.*?)</title>", html, re.DOTALL)
          subject = m.group(1).strip() if m else "Wildfire Aware Situation Report"

          # Email clients are unreliable with <style> sheets, so inline all CSS.
          # Also slim the result to stay under Gmail's ~102KB clipping limit:
          # drop the stylesheet/script, dead in-page jump links, and web-only
          # properties, and add a view-in-browser fallback link up top.
          out = transform(html, disable_validation=True, remove_classes=True,
                          cssutils_logging_level="CRITICAL")
          out = re.sub(r"<style>.*?</style>", "", out, flags=re.DOTALL)
          out = re.sub(r"<script>.*?</script>", "", out, flags=re.DOTALL)
          out = re.sub(r' title="Jump to [^"]*"', "", out)
          out = re.sub(r'<a href="#[^"]*" style="[^"]*">(.*?)</a>', r"\1",
                       out, flags=re.DOTALL)
          for junk in ("transition:border-color 0.15s, box-shadow 0.15s;",
                       "transition:border-color 0.15s, box-shadow 0.15s",
                       "scroll-margin-top:12px;", "scroll-margin-top:12px",
                       "height:100%;", "height:100%"):
              out = out.replace(junk, "")
          out = out.replace(";;", ";").replace(';"', '"')
          # Rebuild the PL banner as a table cell with bgcolor so its maroon
          # fill survives Outlook/Word renderers that drop div backgrounds.
          mb = re.search(r"<!--PLB-->\s*(.*?)\s*<!--/PLB-->", out, re.DOTALL)
          if mb:
              inner = re.sub(r"^<div[^>]*>", "", mb.group(1).strip())
              inner = re.sub(r"</div>$", "", inner)
              table = ('<table role="presentation" width="100%" cellpadding="0" '
                       'cellspacing="0" style="margin-bottom:22px;"><tr>'
                       '<td bgcolor="#5F0000" style="background-color:#5f0000;'
                       'border-radius:14px;padding:20px 22px;color:#f8f4ec;">'
                       + inner + "</td></tr></table>")
              out = out[:mb.start()] + table + out[mb.end():]
          out = out.replace('<div style="max-width:860px',
              '<div style="text-align:center;font-size:12px;color:#8a8178;margin-bottom:10px;">'
              '<a href="https://theanalyticalmoose.github.io/wildfire-sitrep/wildfire-sitrep.html" '
              'style="color:#074259;">View this report in your browser</a></div>'
              '<div style="max-width:860px', 1)
          print(f"email body: {len(out.encode())} bytes (inlined from {len(html.encode())})")

          with open("/tmp/resend.json", "w", encoding="utf-8") as fh:
              json.dump({
                  "from": os.environ["EMAIL_FROM"],
                  "to": [os.environ["EMAIL_TO"]],
                  "subject": subject,
                  "html": out,
              }, fh)
          EOF
          http_code=$(curl -sS -o /tmp/resend-response.json -w "%{http_code}" \
            -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            --data @/tmp/resend.json)
          echo "Resend responded HTTP $http_code"
          cat /tmp/resend-response.json && echo
          if [ "$http_code" -ge 300 ]; then
            echo "Email send failed; see response above."
            exit 1
          fi
          echo "Email sent to $EMAIL_TO"
